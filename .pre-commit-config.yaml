repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: format
        name: Format
        entry: ruff format
        language: python
        pass_filenames: false
        additional_dependencies: [ruff]
      - id: fix-imports
        name: Fix imports
        entry: ruff check --fix --show-fixes
        language: python
        pass_filenames: false
        additional_dependencies: [ruff]
